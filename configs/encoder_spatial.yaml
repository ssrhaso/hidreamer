# SPATIAL ENCODER TRAINING CONFIG
# Trains SpatialAtariEncoder (encoder_v2.py) + SpatialHRVQTokenizer (vq_spatial.py)
#
# COLLAPSE PROBLEM: Pong frames are ~90% black background.
# Plain MSE on embeddings → encoder learns "always output background embedding" → loss=0.
# THREE FIXES APPLIED:
#   1. Foreground-weighted pixel aux loss  — forces patch embeddings to carry brightness info
#   2. Codebook entropy diversity penalty  — penalises codebook collapse
#   3. K-means codebook initialisation    — breaks the initial symmetry

model:
  d_model: 384              # Patch embedding dimension (must match HRVQ codebook dim)
  input_channels: 4         # Stacked grayscale frames

tokenizer:
  num_codes: 256            # Codebook size per level
  # Commitment costs raised vs defaults: EMA already handles codebook update,
  # high commitment cost pushes encoder to commit to spread-out codes.
  commitment_costs: [0.25, 0.5, 1.0]   # [l0, l1, l2] — higher = stronger anti-collapse
  decay: 0.99               # EMA decay for codebook update
  epsilon: 1.0e-5

# Reconstruction loss weights per spatial level (commitment MSE)
loss:
  l0_weight: 1.0            # Coarse patches (2×2)
  l1_weight: 0.7            # Mid patches (4×4)
  l2_weight: 0.5            # Fine patches (4×4)

  # --- Foreground-weighted pixel auxiliary loss ---
  # A small linear head (training-only, discarded afterwards) predicts the mean
  # pixel brightness of each spatial patch. This is the key signal that forces
  # the encoder to produce DIFFERENT embeddings for foreground vs background patches.
  pixel_aux_weight: 5.0     # Weight of pixel aux loss (relative to commitment MSE)
  fg_boost: 50.0            # Extra weight on patches with foreground pixels (>threshold)
  fg_threshold: 0.1         # Pixel value [0,1] above which a pixel is "foreground"

  # --- Codebook entropy diversity penalty ---
  # Penalises low entropy of soft codebook assignments over each batch.
  # Drives the model to use more of the codebook.
  diversity_weight: 0.1     # Weight of (1 - normalised_entropy) penalty
  diversity_temp: 0.5       # Softmax temperature for soft assignments (lower = harder)

# --- K-means codebook initialisation ---
# Before epoch 1, collect encoder outputs from init_batches random batches
# and use a random subset as initial codebook entries.
# This puts the codebook in the right neighbourhood from the start.
kmeans_init:
  enabled: true
  init_batches: 100         # Batches to collect embeddings from (×batch_size frames)

training:
  seed: 42
  batch_size: 64            # Frames per batch (not sequences)
  num_epochs: 30
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_steps: 500
  betas: [0.9, 0.999]
  mixed_precision: true     # float16 AMP on T4

  val_split: 0.05
  eval_every: 1             # Evaluate every N epochs

data:
  games: ['Pong-v5', 'Breakout-v5', 'MsPacman-v5']
  replay_dir: 'data'
  frames_per_game: 100000   # data/{game}/frames.npy — (100000, 4, 84, 84) uint8

logging:
  save_dir: 'checkpoints/spatial_encoder'
  wandb_project: 'hi-dreamer-spatial-encoder'
  log_every: 100            # Steps between log entries
  save_every: 10            # Save checkpoint every N epochs
